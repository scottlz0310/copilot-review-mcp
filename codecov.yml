coverage:
  precision: 2
  round: down
  range: "60...90"

  status:
    project:
      default:
        target: auto
        threshold: 2%
    patch:
      default:
        target: auto
        threshold: 10%
        informational: true

ignore:
  - "cmd/"
  - "internal/auth/"
  - "internal/middleware/"

comment:
  layout: "reach,diff,flags"
  behavior: default
  require_changes: true
